[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["custom_components"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
strict = false
mypy_path = ["."]

[[tool.mypy.overrides]]
module = "custom_components.onecontrol_ble.config_flow"
ignore_errors = true

[[tool.mypy.overrides]]
module = "custom_components.onecontrol_ble.sensor"
ignore_errors = true

[[tool.mypy.overrides]]
module = "Crypto.*"
ignore_missing_imports = true
ignore_errors = true

[[tool.mypy.overrides]]
module = "custom_components.onecontrol_ble.protocol"
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["."]
filterwarnings = [
    "ignore::DeprecationWarning:josepy",
    "ignore::DeprecationWarning:acme",
    "ignore::DeprecationWarning:aiohttp",
    "ignore::DeprecationWarning:homeassistant",
]
